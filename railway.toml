# Railway 配置文件
[build]
  dockerfile = false
  builder = "NIXPACKS"

[env]
  JWT_SECRET = { generated = true, from = "secret" }
  SALT = { generated = true, length = 32 }
  ADMIN_PASSWORD = { generated = true, length = 16, charset = "alphanumeric" }

[deploy]
  domain = "secure-chat"
  startCommand = "node server.js"

# ✅ 正确：healthcheck 作为顶级表（与 deploy 同级）
[healthcheck]
  endpoint = "/health"
  interval = 15
  timeout = 3
  retries = 2
  grace_period = 5

[ports]
  http = 8080
  expose = true
