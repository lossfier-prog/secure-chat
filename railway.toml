# Railway 配置文件
[build]
  dockerfile = false

[env]
  JWT_SECRET = { generated = true, from = "secret" }
  SALT = { generated = true, length = 32 }
  ADMIN_PASSWORD = { generated = true, length = 16, charset = "alphanumeric" }

[deploy]
  domain = "secure-chat"
  [healthcheck]
  endpoint = "/health"
  interval = 15
  timeout = 3
  retries = 2
  grace_period = 5

[ports]
  http = 8080  # 必须与你的监听端口匹配！
  expose = true
