<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全聊天室</title>
  <style>
    body { 
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; 
      max-width: 600px; 
      margin: 20px auto; 
      padding: 0 15px;
      background: #f9f9f9;
      color: #333;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.08);
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #7f8c8d;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #e9ecef;
    }

    input, button {
      padding: 10px 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }

    button:hover {
      background: #2980b9;
    }

    button:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }

    .error {
      color: #e74c3c;
      font-size: 13px;
      margin: 5px 0;
      min-height: 18px;
    }

    #chatBox {
      border: 1px solid #e0e0e0;
      height: 280px;
      overflow-y: auto;
      margin: 15px 0;
      padding: 12px;
      background: #fcfcfc;
      border-radius: 8px;
      font-size: 14px;
    }

    .msg {
      margin: 8px 0;
      line-height: 1.4;
    }

    .system {
      color: #7f8c8d;
      font-style: italic;
      text-align: center;
      font-size: 12px;
      margin: 15px 0;
    }

    .user-msg {
      background: #e8f4fc;
      padding: 8px 12px;
      border-radius: 18px;
      max-width: 85%;
      margin-left: auto;
    }

    .other-msg {
      background: #f1f1f1;
      padding: 8px 12px;
      border-radius: 18px;
      max-width: 85%;
    }

    .hidden { display: none; }

    .room-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0;
      transition: all 0.2s;
    }

    .room-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .room-id {
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .room-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #7f8c8d;
    }

    .badge {
      background: #e74c3c;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .btn-small {
      padding: 5px 10px;
      font-size: 13px;
      background: #2ecc71;
      width: auto;
    }

    .audit-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .audit-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-approve {
      background: #2ecc71;
      flex: 1;
    }

    .btn-reject {
      background: #e74c3c;
      flex: 1;
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .logout-btn {
      background: #e74c3c;
      padding: 5px 12px;
      font-size: 13px;
      width: auto;
    }

    .nav-tabs {
      display: flex;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
    }

    .nav-tab {
      padding: 8px 15px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }

    .nav-tab.active {
      border-bottom: 3px solid #3498db;
      color: #3498db;
      font-weight: 500;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* 管理员面板样式 */
    #adminPanel {
      margin-top: 15px;
      padding: 15px;
      background: #f0f7ff;
      border: 1px solid #d6e9ff;
      border-radius: 8px;
    }
    
    #adminPanel h3 {
      margin-top: 0;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    #adminPanel table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    
    #adminPanel th {
      background: #e3f2fd;
      padding: 8px;
      text-align: left;
    }
    
    #adminPanel td {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
    
    @media (max-width: 480px) {
      body { padding: 10px; }
      .container { padding: 15px; }
      input, button { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 安全聊天室</h1>
    <p class="subtitle">邀请码注册 · 房主审核 · 端到端加密</p>

    <!-- 认证区域 -->
    <div id="authSection">
      <div class="card">
        <input type="text" id="username" placeholder="用户名">
        <input type="password" id="password" placeholder="密码">
        
        <div id="inviteField">
          <input type="text" id="inviteCode" placeholder="邀请码（注册时需要）">

        <button onclick="register()">注册</button>
        <button onclick="login()">登录</button>
        
        <div class="error" id="authMsg"></div>
      </div>
    </div>

    <!-- 聊天区域 -->
    <div id="chatSection" class="hidden">
      <div class="user-header">
        <div>你好，<strong id="currentUsername"></strong>！</div>
        <button class="logout-btn" onclick="logout()">退出</button>
      </div>

      <div class="nav-tabs">
        <div class="nav-tab active" data-tab="chat" onclick="switchTab('chat')">聊天</div>
        <div class="nav-tab" data-tab="myRooms" onclick="switchTab('myRooms')">我的房间</div>
        <div class="nav-tab" data-tab="audit" onclick="switchTab('audit')">审核中心</div>
      </div>

      <!-- 聊天标签页 -->
      <div id="chatTab" class="tab-content active">
        <div id="chatBox"></div>
        
        <div style="margin-top: 15px;">
  <input type="text" id="roomIdInput" placeholder="输入房间号（例如ABC12345）">
  <button onclick="applyToJoinRoom()">申请加入房间</button>
  <div class="error" id="joinError" style="margin-top: 5px;"></div>
</div>

        <div style="margin-top: 15px;">
          <input type="text" id="messageInput" placeholder="输入消息..." disabled>
          <button onclick="sendMessage()" id="sendBtn" disabled>发送</button>
        </div>
      </div>

     <!-- 我的房间标签页 -->
<div id="myRoomsTab" class="tab-content">
  <h3>🏠 我的房间</h3>

  <!-- 添加创建房间按钮 -->
  <div style="margin-bottom: 20px;">
    <button onclick="createRoom()" style="padding: 10px 20px; width: 100%; background: #4CAF50;">
      📦 创建新房间
    </button>
  </div>

  <div id="myRoomsList">
    <!-- 房间列表将自动加载 -->
  </div>
</div>

      <!-- 审核中心标签页 -->
      <div id="auditTab" class="tab-content">
        <h3>📬 审核中心</h3>
        <div id="applicationsList">
          <!-- 申请列表将自动加载 -->
        </div>
      </div>
      
      <!-- 管理员面板 -->
      <div id="adminPanel" class="hidden">
        <h3>🛡️ 管理员面板</h3>
        
        <div>
          <button onclick="generateInviteCode()" class="btn" style="background:#9b59b6">
            ✨ 生成新邀请码
          </button>
          <div id="newInviteCode" style="margin:10px 0; min-height:24px; color:#9b59b6; font-weight:bold;"></div>
        </div>

        <h4 style="margin:15px 0 10px;">历史邀请码（最近50条）</h4>
        <div id="inviteCodesList" style="max-height:200px; overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <script>
    /* ==================== 全局变量 ==================== */
    let ws = null;
    let token = localStorage.getItem('token');
    let currentUsername = '';

    /* DOM 元素 */
    const authSection = document.getElementById('authSection');
    const chatSection = document.getElementById('chatSection');
    const authMsg = document.getElementById('authMsg');
    const currentUsernameEl = document.getElementById('currentUsername');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    /* ==================== 页面初始化 ==================== */
  // 修改后的完整JavaScript代码
document.addEventListener('DOMContentLoaded', () => {
  // 立即检查登录状态
  checkAuth();

  // 每次页面加载时都尝试加载数据
  if (token) {
    loadUserData();
  }
});

// 修改后的checkAuth函数
function checkAuth() {
  token = localStorage.getItem('token');
  if (token) {
    try {
      // 验证token是否过期
      const payload = JSON.parse(atob(token.split('.')[1]));
      currentUsername = payload.username;
      currentUsernameEl.textContent = currentUsername;

      // 检查管理员权限
      if (payload.role === 'admin' && document.getElementById('adminPanel')) {
        document.getElementById('adminPanel').classList.remove('hidden');
      }

      // 显示聊天区域，隐藏认证区域
      authSection.classList.add('hidden');
      chatSection.classList.remove('hidden');

      return true;
    } catch (e) {
      console.error('Invalid token:', e);
      logout();
      return false;
    }
  } else {
    authSection.classList.remove('hidden');
    chatSection.classList.add('hidden');
    return false;
  }
}

// 新增loadUserData函数
async function loadUserData() {
  try {
    // 同时加载所有需要的数据
    await Promise.all([
      loadMyRooms(),
      loadApplications(),
      connectWebSocket()
    ]);

    // 切换到默认标签页
    switchTab('chat');
  } catch (err) {
    console.error('加载用户数据错误:', err);
    showError('加载数据失败，请刷新页面');
  }
}

// 修改loadMyRooms函数
async function loadMyRooms() {
  try {
    const response = await fetch('/my-rooms', {
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const rooms = await response.json();
    const list = document.getElementById('myRoomsList');

    if (!list) {
      console.warn('未找到房间列表元素');
      return;
    }

    if (rooms.length === 0) {
      list.innerHTML = `
        <div class="card">
          <p>你还没有创建任何房间 🎉</p>
          <button onclick="createRoom()" style="margin-top: 10px;">立即创建房间</button>
        </div>
      `;
      return;
    }

    let html = '';
    rooms.forEach(room => {
      html += `
        <div class="room-item">
          <div class="room-id">房间号: ${room.roomId}</div>
          <div class="room-meta">
            <span>创建于: ${formatDateTime(room.createdAt)}</span>
            ${room.pendingCount > 0 ? `<span class="badge">${room.pendingCount} 个待审核</span>` : ''}
          </div>
          <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn-small" onclick="copyRoomId('${room.roomId}')">复制房间号</button>
            <button class="btn-small" onclick="enterMyRoom('${room.roomId}')">进入管理</button>
            <button class="btn-small" style="background: #e74c3c;" onclick="deleteRoom('${room.roomId}')">删除房间</button>
          </div>
        </div>
      `;
    });

    list.innerHTML = html;
  } catch (err) {
    console.error('加载房间列表错误:', err);
    document.getElementById('myRoomsList').innerHTML = `
      <div class="error">加载房间列表失败，请刷新页面试试</div>
    `;
    throw err;
  }
}

// 修改createRoom函数
async function createRoom() {
  try {
    const roomName = prompt('请输入房间名称（可留空使用默认名称）:', '');
    if (roomName === null) return; // 用户取消

    const response = await fetch('/rooms', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        roomName: roomName || '我的聊天室'
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || '创建房间失败');
    }

    // 创建成功后
    alert(`🎉 房间创建成功!\n\n房间号: ${data.roomId}\n\n请保存好这个ID，其他用户需要它才能申请加入。`);

    // 刷新房间列表
    await loadMyRooms();

    // 切换到"我的房间"标签页
    switchTab('myRooms');
  } catch (err) {
    console.error('创建房间错误:', err);
    showError(err.message || '创建房间失败');
  }
}

// 修改WebSocket连接函数
function connectWebSocket() {
  return new Promise((resolve, reject) => {
    if (ws) {
      ws.close();
    }

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}?token=${token}`;

    console.log('正在连接WebSocket:', wsUrl);
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      console.log('WebSocket连接成功');
      messageInput.disabled = false;
      sendBtn.disabled = false;
      resolve();
    };

    ws.onerror = (error) => {
      console.error('WebSocket连接错误:', error);
      addSystemMessage('⚠️ 无法连接聊天服务器，实时功能不可用');
      reject(error);
    };

    // 保留现有的onmessage和onclose处理
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        // ... 保留现有处理逻辑
      } catch (err) {
        console.error('处理消息错误:', err);
      }
    };

    ws.onclose = () => {
      console.log('WebSocket连接关闭');
      messageInput.disabled = true;
      sendBtn.disabled = true;
      addSystemMessage('🔌 已断开与服务器的连接');
    };
  });
}

// 新增复制房间号功能
function copyRoomId(roomId) {
  navigator.clipboard.writeText(roomId).then(() => {
    alert(`房间号已复制: ${roomId}\n\n你可以分享给其他用户申请加入。`);
  }).catch(err => {
    console.error('复制失败:', err);
    prompt('复制房间号:', roomId);
  });
}

// 删除房间功能
async function deleteRoom(roomId) {
  // 确认对话框
  if (!confirm(`确定要删除房间 ${roomId} 吗？\n\n此操作将删除房间内的所有消息和成员数据，且无法恢复。`)) {
    return;
  }

  try {
    const response = await fetch(`/rooms/${roomId}`, {
      method: 'DELETE',
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await response.json();

    if (response.ok) {
      alert('房间删除成功！');
      // 更新房间列表
      await loadMyRooms();
    } else {
      alert(`删除失败: ${data.error || '未知错误'}`);
    }
  } catch (error) {
    console.error('删除房间错误:', error);
    alert('删除房间时发生错误，请重试。');
  }
}

// 修改switchTab函数
function switchTab(tabName) {
  // 隐藏所有标签页内容
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
  });

  // 移除所有标签的active类
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.remove('active');
  });

  // 激活选中的标签和内容
  document.querySelector(`.nav-tab[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById(`${tabName}Tab`).classList.add('active');

  // 根据不同标签页加载数据
  switch(tabName) {
    case 'myRooms':
      loadMyRooms();
      break;
    case 'audit':
      loadApplications();
      break;
    // chat标签页不需要特殊加载
  }
}

// 修改格式化时间函数
function formatDateTime(dateTimeStr) {
  if (!dateTimeStr) return '未知时间';

  try {
    const date = new Date(dateTimeStr);
    if (isNaN(date.getTime())) return dateTimeStr;

    return date.toLocaleString('zh-CN', {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    }).replace(' ', ' ');
  } catch (e) {
    console.error('格式化时间错误:', e);
    return dateTimeStr;
  }
}

    /* ==================== 认证功能 ==================== */

    function register() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const inviteCode = document.getElementById('inviteCode').value.trim();

      if (!username || !password || !inviteCode) {
        showError('所有字段不能为空！');
        return;
      }

      fetch('register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, inviteCode })
      })
      .then(res => res.json())
      .then(data => {
        if (data.token) {
          token = data.token;
          localStorage.setItem('token', token);
          
          /* 解析用户名 */
          const payload = JSON.parse(atob(token.split('.')[1]));
          currentUsername = payload.username;
          currentUsernameEl.textContent = currentUsername;
          
          enterChat();
        } else {
          showError(data.error || '注册失败');
        }
      })
      .catch(() => showError('网络错误'));
    }

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('用户名密码不能为空！');
        return;
      }

      fetch('login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.token) {
          token = data.token;
          localStorage.setItem('token', token);
          
          /* 解析用户名 */
          const payload = JSON.parse(atob(token.split('.')[1]));
          currentUsername = payload.username;
          currentUsernameEl.textContent = currentUsername;
          
          /* 检查管理员权限 */
          checkAdminStatus();
          
          enterChat();
        } else {
          showError(data.error || '登录失败');
        }
      })
      .catch(() => showError('网络错误'));
    }

    function logout() {
      if (ws) {
        ws.close();
        ws = null;
      }
      
      localStorage.removeItem('token');
      token = null;
      
      chatSection.classList.add('hidden');
      authSection.classList.remove('hidden');
      
      /* 重置输入框 */
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('inviteCode').value = '';
      authMsg.textContent = '';
      
      /* 隐藏管理员面板 */
      document.getElementById('adminPanel').classList.add('hidden');
    }

    function showError(message) {
      authMsg.textContent = message;
      setTimeout(() => {
        if (authMsg.textContent === message) {
          authMsg.textContent = '';
        }
      }, 5000);
    }

    /* ==================== 管理员功能 ==================== */
    function checkAdminStatus() {
      fetch('admin/invite-codes', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => {
        if (res.ok) {
          document.getElementById('adminPanel').classList.remove('hidden');
          loadInviteCodes();
        }
      })
      .catch(() => {
        /* 非管理员，不显示面板 */
      });
    }

    /* 生成新邀请码 */
    function generateInviteCode() {
      fetch('admin/generate-invite', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(data => {
        const el = document.getElementById('newInviteCode');
        el.innerHTML = `新邀请码 <span style="color:#9b59b6; font-size:18px;">${data.inviteCode}</span>`;
        setTimeout(() => el.innerHTML = '', 10000); /* 10秒后清除 */
        loadInviteCodes(); /* 刷新列表 */
      })
      .catch(err => {
        console.error('生成邀请码错误', err);
        showError('生成邀请码失败');
      });
    }

    /* 加载邀请码列表 */
    function loadInviteCodes() {
      fetch('admin/invite-codes', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(codes => {
        let html = '<table><tr><th>邀请码</th><th>状态</th><th>创建时间</th><th>使用人</th></tr>';
        
        codes.forEach(code => {
          const status = code.used ? 
            `<span style="color:#27ae60;">已使用</span>` : 
            `<span style="color:#e74c3c;">未使用</span>`;
          
          html += `<tr>
            <td>${code.code}</td>
            <td style="text-align:center;">${status}</td>
            <td style="font-size:12px;">${formatDateTime(code.created_at)}</td>
            <td>${code.used_by || '-'}</td>
          </tr>`;
        });
        
        html += '</table>';
        document.getElementById('inviteCodesList').innerHTML = html;
      })
      .catch(err => {
        console.error('加载邀请码错误', err);
      });
    }

    /* 格式化日期时间 */
    function formatDateTime(dateTimeStr) {
      if (!dateTimeStr) return '';
      
      const date = new Date(dateTimeStr);
      return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    /* ==================== 聊天功能 ==================== */

    function enterChat() {
      authSection.classList.add('hidden');
      chatSection.classList.remove('hidden');
      
      /* 加载我的房间 */
      loadMyRooms();
      
      /* 加载审核列表 */
      loadApplications();

      /* 连接 WebSocket */
      connectWebSocket();
    }

    function connectWebSocket() {
      if (ws) {
        ws.close();
      }

      /* 修复：使用当前页面的完整 URL 作为 WebSocket 地址 */
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${window.location.host}?token=${token}`;
      
      console.log('尝试连接 WebSocket:', wsUrl); // 调试用
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log('WebSocket 连接成功');
        messageInput.disabled = false;
        sendBtn.disabled = false;
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const chatBox = document.getElementById('chatBox');

        if (data.type === 'system') {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'system';
          msgDiv.textContent = data.text;
          chatBox.appendChild(msgDiv);
        } 
        else if (data.type === 'msg') {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'msg';
          
          if (data.sender === currentUsername) {
            msgDiv.innerHTML = `<div class="user-msg">
              <strong>你</strong> (${data.time})：<br>${data.text}
            </div>`;
          } else {
            msgDiv.innerHTML = `<div class="other-msg">
              <strong>${data.sender}</strong> (${data.time})：<br>${data.text}
            </div>`;
          }
          
          chatBox.appendChild(msgDiv);
        }
        else if (data.type === 'new_application') {
          /* 房主收到新申请通知 */
          alert(`📩 有新申请！打开"审核中心"查看`);
          loadApplications();
        }
        else if (data.type === 'application_approved') {
          /* 申请被批准 */
          joinWsRoom(data.roomDbId);
          addSystemMessage('✅ 你的申请已批准！已加入房间');
        }
        else if (data.type === 'application_rejected') {
          /* 申请被拒绝 */
          addSystemMessage('❌ 你的申请已被拒绝');
        }

        /* 自动滚动到底部 */
        chatBox.scrollTop = chatBox.scrollHeight;
      };

      ws.onclose = () => {
        console.log('WebSocket 连接关闭');
        messageInput.disabled = true;
        sendBtn.disabled = true;
        
        /* 尝试重新连接（最多 3 次） */
        setTimeout(() => {
          if (!ws) connectWebSocket();
        }, 3000);
      };

      ws.onerror = (error) => {
        console.error('WebSocket 错误', error);
        addSystemMessage('⚠️ 连接出现问题，请稍候重试');
      };
    }

    function addSystemMessage(text) {
      const chatBox = document.getElementById('chatBox');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'system';
      msgDiv.textContent = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function joinRoom() {
      const pwd = document.getElementById('roomPassword').value.trim();
      if (!pwd) return alert('请输入房间密码！');

      ws.send(JSON.stringify({ type: 'join', password: pwd }));
      document.getElementById('roomPassword').value = '';
    }

    function joinWsRoom(roomIdHash) {
      ws.send(JSON.stringify({ 
        type: 'join-as-owner', 
        roomIdHash: roomIdHash 
      }));
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !ws) return;

      ws.send(JSON.stringify({ type: 'msg', text: text }));
      messageInput.value = '';
    }

    /* ==================== 我的房间功能 ==================== */

    // 统一的加载我的房间函数
async function loadMyRooms() {
  console.log('🔄 正在加载我的房间列表');
  const token = localStorage.getItem('token');
  if (!token) return;

  try {
    const response = await fetch('/my-rooms', {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (!response.ok) {
      throw new Error(`HTTP错误: ${response.status}`);
    }

    const rooms = await response.json();
    console.log('📊 后端返回的房间数据:', rooms); // 调试用日志

    // 更新"我的房间"标签页列表
    const myRoomsList = document.getElementById('myRoomsList');
    if (rooms.length === 0) {
        myRoomsList.innerHTML = '<p>你还没有创建任何房间 🎉</p>';
      } else {
        let html = '';
        rooms.forEach(room => {
          html += `
            <div class="room-item">
              <div class="room-id">房间ID ${room.roomId}</div>
              <div class="room-meta">
                <span>创建时间 ${formatDateTime(room.createdAt)}</span>
                <span class="badge">待审核 ${room.pendingCount || 0}</span>
              </div>
              <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-small" onclick="copyRoomId('${room.roomId}')">复制房间号</button>
                <button class="btn-small" onclick="enterMyRoom('${room.roomId}')">进入房间</button>
                <button class="btn-small" style="background: #e74c3c;" onclick="deleteRoom('${room.roomId}')">删除房间</button>
              </div>
            </div>
          `;
        });
        myRoomsList.innerHTML = html;
      }

    // 更新dashboard房间列表（如果存在）
    const roomList = document.getElementById('roomList');
    if (roomList) {
      if (rooms.length === 0) {
        roomList.innerHTML = '<li>暂无房间，点击上方按钮创建吧！</li>';
      } else {
        let html = '';
        rooms.forEach(room => {
          html += `
            <li>
              📌 房间ID: <code>${room.roomId}</code>  
              创建时间: ${new Date(room.createdAt).toLocaleString()}
              <button onclick="copyRoomId('${room.roomId}')" style="margin-left:10px;">复制房间号</button>
            </li>
          `;
        });
        roomList.innerHTML = html;
      }
    }
  } catch (err) {
    console.error('❌ 加载房间列表错误:', err);
    document.getElementById('myRoomsList').innerHTML = '<p style="color:red;">加载房间失败，请刷新页面重试</p>';
  }
}

    function enterMyRoom(roomIdHash) {
      ws.send(JSON.stringify({
        type: 'join-as-owner',
        roomIdHash: roomIdHash
      }));
      
      /* 切换到聊天标签页 */
      switchTab('chat');
    }

    /* ==================== 审核中心功能 ==================== */

    async function loadApplications() {
      const list = document.getElementById('applicationsList');
      list.innerHTML = '<p>加载中...</p>';

      try {
        let allApplications = [];
        let errors = [];

        // 1. 获取用户作为房主需要审核的申请
        try {
          const roomsResponse = await fetch('/my-rooms', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          if (roomsResponse.ok) {
            const rooms = await roomsResponse.json();
            
            // 为每个房间获取待审核的申请
            for (const room of rooms) {
              try {
                const appsResponse = await fetch(`/rooms/${room.roomId}/applications`, {
                  headers: { 'Authorization': `Bearer ${token}` }
                });

                if (appsResponse.ok) {
                  const apps = await appsResponse.json();
                  // 为每个申请添加房间信息
                  apps.forEach(app => {
                    app.roomId = room.roomId;
                    app.type = 'toReview'; // 标记为需要审核的申请
                  });
                  allApplications = [...allApplications, ...apps];
                }
              } catch (roomErr) {
                console.error(`获取房间 ${room.roomId} 申请失败`, roomErr);
                errors.push(`房间 ${room.roomId} 申请获取失败`);
              }
            }
          } else {
            console.error('获取房间列表失败', roomsResponse.status);
            errors.push('房间列表获取失败');
          }
        } catch (err) {
          console.error('获取房间列表错误', err);
          errors.push('房间列表获取失败');
        }

        // 2. 获取用户自己提交的申请
        try {
          const myAppsResponse = await fetch('/my-applications', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          if (myAppsResponse.ok) {
            const myApps = await myAppsResponse.json();
            // 为每个申请添加类型标记
            myApps.forEach(app => {
              app.type = 'myApplication'; // 标记为自己的申请
            });
            allApplications = [...allApplications, ...myApps];
          } else {
            console.error('获取自己的申请失败', myAppsResponse.status);
            errors.push('个人申请获取失败');
          }
        } catch (err) {
          console.error('获取自己的申请错误', err);
          errors.push('个人申请获取失败');
        }

        if (allApplications.length === 0) {
          if (errors.length > 0) {
            list.innerHTML = `<p>加载申请时遇到错误：${errors.join('、')}</p><p>部分申请可能未显示</p>`;
          } else {
            list.innerHTML = '<p>暂无申请</p>';
          }
          return;
        }

        // 按时间倒序排序，最新的申请在前面
        allApplications.sort((a, b) => {
          return new Date(b.created_at || b.createdAt) - new Date(a.created_at || a.createdAt);
        });

        let html = '';
        allApplications.forEach(app => {
          // 安全的时间格式化函数
          const formatTime = (timeStr) => {
            if (!timeStr) return '未知时间';
            try {
              const date = new Date(timeStr);
              if (isNaN(date.getTime())) return timeStr;
              return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
              });
            } catch (e) {
              return timeStr;
            }
          };

          if (app.type === 'toReview') {
            // 需要审核的申请
            html += `
              <div class="audit-item">
                <div><strong>${app.username}</strong> 申请加入房间 ${app.roomId}</div>
                <div class="room-meta">
                  <span>申请时间 ${formatTime(app.created_at)}</span>
                </div>
                <div class="audit-actions">
                  <button class="btn-approve" onclick="approve(${app.id})">✅ 批准</button>
                  <button class="btn-reject" onclick="reject(${app.id})">❌ 拒绝</button>
                </div>
              </div>
            `;
          } else {
            // 自己的申请
            html += `
              <div class="audit-item">
                <div>你申请加入房间 ${app.room_id}</div>
                <div class="room-meta">
                  <span>申请时间 ${formatTime(app.created_at)}</span>
                  <span>状态: ${app.status === 'pending' ? '待审核' : app.status === 'approved' ? '已批准' : '已拒绝'}</span>
                </div>
              </div>
            `;
          }
        });
        
        if (errors.length > 0) {
          html = `<div style="color: #ff6b6b; margin-bottom: 10px;">加载时遇到错误：${errors.join('、')}</div>` + html;
        }
        
        list.innerHTML = html;
      } catch (err) {
        console.error('加载申请错误', err);
        list.innerHTML = `<p>加载申请失败：${err.message}</p><p>请刷新页面重试</p>`;
      }
    }

    function approve(appId) {
      fetch(`applications/${appId}/approve`, {
        method: 'POST',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      })
      .then(() => loadApplications())
      .catch(err => {
        console.error('批准申请错误', err);
        showError('批准失败');
      });
    }

    function reject(appId) {
      fetch(`applications/${appId}/reject`, {
        method: 'POST',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      })
      .then(() => loadApplications())
      .catch(err => {
        console.error('拒绝申请错误', err);
        showError('拒绝失败');
      });
    }

    /* ==================== 标签页切换 ==================== */

    function switchTab(tabName) {
      /* 更新标签样式 */
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`.nav-tab[data-tab="${tabName}"]`).classList.add('active');

      /* 显示对应内容 */
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      document.getElementById(`${tabName}Tab`).classList.add('active');

      /* 特殊处理 */
      if (tabName === 'audit') {
        loadApplications();
      } else if (tabName === 'myRooms') {
        loadMyRooms();
      }
    }

    /* ==================== 键盘事件 ==================== */

    document.getElementById('messageInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    document.getElementById('roomPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') joinRoom();
    });

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });

    document.getElementById('inviteCode').addEventListener('keypress', e => {
      if (e.key === 'Enter') register();
    });
    // ====================== 1. 检查登录状态 ======================
function checkLogin() {
  const token = localStorage.getItem('token');
  if (!token) {
    // 未登录 → 显示登录框
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  } else {
    // 已登录 → 显示仪表盘
    try {
      // 解码 JWT 获取用户名
      const payload = JSON.parse(atob(token.split('.')[1]));
      document.getElementById('username').textContent = payload.username;
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('loginSection').style.display = 'none';

      // 加载房间列表
      loadMyRooms();
    } catch (e) {
      console.error('无效令牌', e);
      localStorage.removeItem('token');
      checkLogin(); // 重新检查
    }
  }
}

// 复制房间号到剪贴板
function copyRoomId(roomId) {
  navigator.clipboard.writeText(roomId).then(() => {
    alert(`房间号已复制：${roomId}\n请分享给其他用户，让他们用此号申请加入！`);
  });
}

// ====================== 3. 创建房间按钮事件 ======================
document.getElementById('createRoomBtn').addEventListener('click', async () => {
  const token = localStorage.getItem('token');
  if (!token) return alert('请先登录！');

  try {
    const res = await fetch('/rooms', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await res.json();
    if (res.ok) {
      alert(`✅ 房间创建成功！\n\n你的房间号是：${data.roomId}\n\n请保存好此房间号，其他用户需要此号才能申请加入。`);
      loadMyRooms(); // 刷新房间列表
    } else {
      alert(`❌ 失败：${data.error}`);
    }
  } catch (err) {
    console.error(err);
    alert('网络错误，请重试');
  }
});
/* 创建房间功能 */
async function createRoom() {
  const token = localStorage.getItem('token');
  if (!token) {
    alert('请先登录!');
    return;
  }

  try {
    // 弹出输入框让用户输入房间名（可选）
    const roomName = prompt('请输入房间名称（可选，默认随机命名）:', '');
    if (roomName === null) return; // 用户取消

    const response = await fetch('/rooms', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        roomName: roomName || '我的聊天室' // 如果用户没输入，使用默认名
      })
    });

    const data = await response.json();

    if (response.ok) {
      alert(`🎉 房间创建成功!\n房间ID: ${data.roomId}\n请保存好这个ID，其他用户需要它才能申请加入。`);
      loadMyRooms(); // 刷新房间列表
    } else {
      alert(`❌ 创建失败: ${data.error || '未知错误'}`);
    }
  } catch (error) {
    console.error('创建房间错误:', error);
    alert('创建房间时发生错误，请重试。');
  }
}
    async function applyToJoinRoom() {
  const roomId = document.getElementById('roomIdInput').value.trim().toUpperCase();
  const joinError = document.getElementById('joinError');

  if (!roomId) {
    joinError.textContent = '请输入房间号';
    return;
  }

  if (roomId.length < 6) {
    joinError.textContent = '房间号格式不正确';
    return;
  }

  try {
    const response = await fetch(`/rooms/${roomId}/applications`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await response.json();

    if (response.ok) {
      joinError.textContent = '';
      document.getElementById('roomIdInput').value = '';
      addSystemMessage(`✅ 申请提交成功！等待房主审核... (房间号: ${roomId})`);

      // 如果WebSocket连接正常，还可以发送通知
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'application_submitted',
          roomId: roomId
        }));
      }
    } else {
      joinError.textContent = data.error || '申请失败';
    }
  } catch (error) {
    console.error('申请加入房间错误:', error);
    joinError.textContent = '网络错误，请重试';
  }
}
